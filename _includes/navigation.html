<header>
  <nav class="nav">
    <div class="nav-container">
      <a href="{{ site.baseurl }}/">
        <h2 class="nav-title">Home</h2>
      </a>
      <ul>
        <li class="{% if page.url contains '/projects' %}active{% endif %}">
          <a href="{{ '/projects' | prepend: site.baseurl }}">Projects</a>
        </li>
        <li class="{% if page.url contains '/blog' or page.url contains '/tags' %}active{% endif %}">
          <a href="{{ '/blog' | prepend: site.baseurl }}">Blog</a>
        </li>
        <li class="{% if page.url contains '/about' %}active{% endif %}">
          <a href="{{ '/about' | prepend: site.baseurl }}">About</a>
        </li>
        <li class="nav-toggle-item">
          <button class="theme-toggle" type="button" aria-label="Toggle light and dark theme" title="Toggle theme">
            <i class="fas fa-moon theme-icon-dark" aria-hidden="true"></i>
            <i class="fas fa-sun theme-icon-light" aria-hidden="true"></i>
          </button>
        </li>
      </ul>
    </div>
  </nav>
</header>
