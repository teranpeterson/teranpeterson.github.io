# Site settings
title:          Teran
description:    "Software Engineer"
url:            "https://teranpeterson.com"

# Google Analytics 4 — Measurement ID (Admin -> Data Streams -> web stream).
# Leave blank to disable analytics.
google_analytics: G-CFPTYPV45N

# Author
author:
  name:         Teran Peterson
  url:          https://teranpeterson.com
  email:        teran@teranpeterson.com

# Build settings
markdown:       kramdown
include:
  - _pages

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives

# Tag archives -> /tags/:name/ (generated by jekyll-archives)
jekyll-archives:
  enabled:
    - tags
  layouts:
    tag: tag
  permalinks:
    tag: /tags/:name/

# Permalinks
permalink:      /blog/:year-:month-:day/:title
paginate:       5
paginate_path:  "/blog/page:num/"

# Default front matter. Provides a fallback social/OG image (used by
# jekyll-seo-tag) for any page that doesn't set its own `image`.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/portfolio.png

# Excludes
exclude: [ Gemfile, Gemfile.lock ]
