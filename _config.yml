# Site settings
title:          Teran
description:    "Software Engineer"
url:            "https://teranpeterson.com"

# Google Analytics
google_analytics: G-CFPTYPV45N

# Author
author:
  name:         Teran Peterson
  url:          https://teranpeterson.com
  email:        teran@teranpeterson.com

# Build settings
markdown:       kramdown
include:
  - _pages

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# jekyll-minifier: Dart Sass already outputs compressed CSS, and cssminify2
# mangles white/black rgba() into invalid hsla(0,0,...) values, so skip CSS
# here and only minify HTML/JS.
jekyll-minifier:
  compress_css: false

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate-v2
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-minifier

# Tag archives -> /tags/:name/ (generated by jekyll-archives)
jekyll-archives:
  enabled:
    - tags
  layouts:
    tag: tag
  permalinks:
    tag: /tags/:name/

# Permalinks
permalink:      /blog/:year-:month-:day/:title

# Pagination (jekyll-paginate-v2). Enabled per-page via front matter
# (see blog/index.html). Tag pages are handled by jekyll-archives, so
# autopages are disabled here to avoid overlap.
pagination:
  enabled:      true
  per_page:     5
  permalink:    "/page:num/"
  sort_field:   "date"
  sort_reverse: true
  trail:
    before:     2
    after:      2

autopages:
  enabled:      false

# Default front matter. Provides a fallback social/OG image (used by
# jekyll-seo-tag) for any page that doesn't set its own `image`.
defaults:
  - scope:
      path: ""
    values:
      image: /assets/portfolio.png

# Excludes
exclude: [ Gemfile, Gemfile.lock ]
